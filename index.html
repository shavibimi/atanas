<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atanas</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Kosans';
            src: url('Kosans DEMO.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Roma Solid';
            src: url('roma-solid.otf') format('opentype');
        }
        @font-face {
            font-family: 'Eric Machat';
            src: url('fonnts.com-Eric_Machat_Light.otf') format('opentype');
        }
        body {
            background-color: #ffffff;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-blend-mode: normal;
            background-image: linear-gradient(rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0.35)), url('background.png');
            color: #000000;
            font-family: 'Kosans', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 {
            font-size: 7.5rem;
            margin: 0;
            letter-spacing: 1.65rem;
            font-weight: 300;
            font-family: 'Roma Solid', 'Kosans', sans-serif;
        }
        p {
            font-size: 1.9rem;
            margin: 0;
            font-family: 'Eric Machat', 'Roboto', sans-serif;
            font-weight: 400;
        }
        .top-label {
            margin-bottom: 3.5rem;
        }
        .bottom-label {
            margin-top: 3.5rem;
        }
        @media (max-width: 768px) {
            h1 {
                font-size: 3.3rem;
            }
            p {
                font-size: 1.5rem;
            }
        }
        @media (max-width: 480px) {
            h1 {
                font-size: 2.8rem;
            }
            p {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <p class="top-label">NEW EUROPE OUTLIERS</p>
    <h1>Atanas</h1>
    <p class="bottom-label">ZERO</p>
</body>
</html>
